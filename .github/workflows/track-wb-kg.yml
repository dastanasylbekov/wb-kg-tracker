name: Трекер справочного центра WB (мультистрановой)

on:
  schedule:
    # Будни в 03:00 UTC = 09:00 по Бишкеку. День недели 1-5 = пн-пт.
    - cron: "0 3 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

# СПИСОК ДЛЯ ОТСЛЕЖИВАНИЯ — меняется здесь, через пробел.
# Формат: код страны, либо код:язык (напр. ge:ka — Грузия на грузинском).
# Доступные коды: kg by kz am uz ge tj ru
env:
  COUNTRIES: "kg by kz am uz tj ge ge:ka"

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install requests beautifulsoup4 lxml

      - name: Собрать все страны
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: |
          fail=0
          for entry in $COUNTRIES; do
            country="${entry%%:*}"
            lang="${entry#*:}"
            [ "$lang" = "$entry" ] && lang="ru"   # нет двоеточия -> язык ru
            echo "::group::$country ($lang)"
            python wb_kg_tracker.py --country "$country" --lang "$lang" --delay 0.6 --notify \
              || { echo "[warn] $country/$lang завершилась с ошибкой"; fail=1; }
            echo "::endgroup::"
          done
          echo "FAIL=$fail" >> "$GITHUB_ENV"

      - name: Собрать STATUS.md (пульс прогона)
        run: python wb_kg_tracker.py --status

      - name: Закоммитить изменения
        run: |
          git config user.name  "wb-kg-tracker"
          git config user.email "actions@users.noreply.github.com"
          [ -d data ] && git add data
          git add STATUS.md
          if git diff --cached --quiet; then
            echo "Изменений нет — коммит не нужен."
          else
            git commit -m "WB: обновление данных $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Отметить сбои сбора (если были)
        run: |
          if [ "${FAIL:-0}" = "1" ]; then
            echo "Одна или несколько стран не собрались — см. лог шага «Собрать все страны»."
            exit 1
          fi
