name: Трекер справочного центра WB (KG)

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Установить зависимости
        run: pip install requests beautifulsoup4 lxml
      - name: Запустить трекер
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python wb_kg_tracker.py --notify --delay 0.6
      - name: Закоммитить изменения снимка
        run: |
          git config user.name  "wb-kg-tracker"
          git config user.email "actions@users.noreply.github.com"
          for f in snapshot.json CHANGES.md changes_history.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "Изменений нет — коммит не нужен."
          else
            git commit -m "WB KG: обновление снимка $(date -u +%Y-%m-%d)"
            git push
          fi
