<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>История изменений справки WB</title>
<style>
  body{margin:0;background:#14142a;color:#e9e9f3;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:15px;line-height:1.5}
  a{color:#7f9cff;text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:820px;margin:0 auto;padding:28px 20px 64px}
  h1{font-size:21px;margin:0}
  .sub{color:#8a8ab0;font-size:13px;margin-top:4px}
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0 4px}
  .tab{background:#1c1c38;border:1px solid #2c2c52;border-radius:999px;
    padding:7px 13px;font-size:14px;cursor:pointer;color:#8a8ab0}
  .tab.on{background:#2a3a8f;border-color:#4361ee;color:#fff}
  .tab .c{opacity:.6;font-size:12px;margin-left:5px}
  .day{margin:22px 0 4px;font-size:14px;font-weight:700;color:#b9b9d8;
    padding-bottom:6px;border-bottom:1px solid #2c2c52}
  .item{padding:9px 0;border-bottom:1px solid #23233f;display:flex;gap:10px;align-items:baseline}
  .t{font-size:11px;padding:1px 7px;border-radius:999px;white-space:nowrap}
  .t.date_changed{background:rgba(255,100,100,.16);color:#ff8080}
  .t.added{background:rgba(67,97,238,.2);color:#9db0ff}
  .t.removed{background:rgba(138,138,176,.16);color:#8a8ab0}
  .ch{color:#8a8ab0;font-size:13px;margin-left:auto;white-space:nowrap}
  .empty{color:#8a8ab0;padding:36px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>История изменений справки WB</h1>
  <div class="sub" id="sub">за последние 90 дней · загрузка данных…</div>
  <div class="tabs" id="tabs"></div>
  <div id="feed"><div class="empty">Загрузка…</div></div>
</div>

<script>
  // ==== НАСТРОЙКА ====
  // Список стран — чтобы добавить/убрать, правьте только этот массив.
  // folder — имя папки внутри data/ (для грузинской версии это "ge-ka").
  const COUNTRIES = [
    {folder:"kg",    name:"Кыргызстан",  flag:"🇰🇬"},
    {folder:"by",    name:"Беларусь",    flag:"🇧🇾"},
    {folder:"kz",    name:"Казахстан",   flag:"🇰🇿"},
    {folder:"am",    name:"Армения",     flag:"🇦🇲"},
    {folder:"uz",    name:"Узбекистан",  flag:"🇺🇿"},
    {folder:"tj",    name:"Таджикистан", flag:"🇹🇯"},
    {folder:"ge",    name:"Грузия",      flag:"🇬🇪"},
    {folder:"ge-ka", name:"Грузия (ka)", flag:"🇬🇪"},
  ];
  const DAYS = 90;
  // Откуда брать данные. Относительный путь работает, когда страница
  // открыта через GitHub Pages (папка data/ лежит рядом с history.html).
  // Если понадобится абсолютный адрес, замените на:
  //   "https://raw.githubusercontent.com/<логин>/<репо>/main/data"
  const DATA_BASE = "data";
  // ===================

  const LAB = {date_changed:"дата", added:"новая", removed:"исчезла"};
  const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

  function cutoffISO(){
    const d = new Date();
    d.setDate(d.getDate() - DAYS);
    return d.toISOString().slice(0,10);
  }

  async function loadCountry(c){
    try{
      const r = await fetch(`${DATA_BASE}/${c.folder}/changes_history.json`, {cache:"no-store"});
      if(!r.ok) return {...c, changes:[]};        // нет файла = изменений ещё не было
      const all = await r.json();
      const cut = cutoffISO();
      const changes = all
        .filter(x => (x.run || "") >= cut)
        .sort((a,b) => a.run < b.run ? 1 : a.run > b.run ? -1 : 0);
      return {...c, changes};
    }catch(e){
      return {...c, changes:[], error:true};
    }
  }

  let DATA = [];
  let active = null;

  function render(){
    document.getElementById("tabs").innerHTML = DATA.map(c =>
      `<span class="tab${c.folder===active?" on":""}" data-c="${esc(c.folder)}">`
      + `${c.flag?c.flag+" ":""}${esc(c.name)}<span class="c">${c.changes.length}</span></span>`).join("");
    document.querySelectorAll(".tab").forEach(t => t.onclick = () => { active = t.dataset.c; render(); });

    const c = DATA.find(x => x.folder === active);
    const feed = document.getElementById("feed");
    if(!c || !c.changes.length){
      feed.innerHTML = `<div class="empty">${c && c.error ? "Не удалось загрузить данные." : "За период изменений нет."}</div>`;
      return;
    }
    const byRun = {};
    c.changes.forEach(r => { (byRun[r.run] = byRun[r.run] || []).push(r); });
    let html = "";
    for(const run of Object.keys(byRun).sort().reverse()){
      html += `<div class="day">${esc(run)}</div>`;
      for(const r of byRun[run]){
        const ch = r.type==="date_changed" ? `${esc(r.old)} → ${esc(r.new)}`
                 : r.type==="added" ? `новая (${esc(r.new)})` : "исчезла";
        const link = r.url
          ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)||"(без названия)"}</a>`
          : esc(r.title);
        html += `<div class="item"><span class="t ${r.type}">${LAB[r.type]||""}</span>`
              + `<span>${link}</span><span class="ch">${ch}</span></div>`;
      }
    }
    feed.innerHTML = html;
  }

  (async function init(){
    DATA = await Promise.all(COUNTRIES.map(loadCountry));
    active = DATA.length ? DATA[0].folder : null;
    const now = new Date().toLocaleString("ru-RU", {hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit", year:"numeric"});
    document.getElementById("sub").textContent = `за последние ${DAYS} дней · данные из репозитория · загружено ${now}`;
    render();
  })();
</script>
</body>
</html>
